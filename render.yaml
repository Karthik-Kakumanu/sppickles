
# Production deployment with frontend build
services:
  - type: web
    name: sp-pickles-backend
    env: node
    plan: free
    buildCommand: npm install && cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: JWT_SECRET
        value: 1d2f3c4a5b6e7f8091a2b3c4d5e6f7089a1b2c3d4e5f60718293a4b5c6d7e8f9
      - key: DATABASE_URL
        fromDatabase:
          name: sp-pickles-db
          property: connectionString
      - key: OTP_PROVIDER
        value: fast2sms
      - key: FAST2SMS_ENDPOINT
        value: https://www.fast2sms.com/dev/bulkV2
      - key: FAST2SMS_ROUTE
        value: otp
      - key: FAST2SMS_API_KEY
        sync: false
      - key: ADMIN_PASSWORD_RESET_ALLOWED_PHONE
        sync: false
      - key: ADMIN_PASSWORD_RESET_OTP_TTL_MS
        value: 600000
      - key: RAZORPAY_MODE
        value: live
      - key: RAZORPAY_LIVE_KEY_ID
        sync: false
      - key: RAZORPAY_LIVE_KEY_SECRET
        sync: false
      - key: RAZORPAY_TEST_KEY_ID
        sync: false
      - key: RAZORPAY_TEST_KEY_SECRET
        sync: false
      - key: RAZORPAY_CURRENCY
        value: INR

databases:
  - name: sp-pickles-db
    databaseName: sp_pickles
    user: sp_pickles_user
    plan: free
    region: oregon
