
# Production deployment with frontend build and admin seed
services:
  - type: web
    name: sp-pickles-backend
    env: node
    plan: free
    buildCommand: npm install && npm run build:frontend && cd backend && npm install && npm run create-admin admin@sppickles.com sppickles@23
    startCommand: cd backend && npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: JWT_SECRET
        value: 1d2f3c4a5b6e7f8091a2b3c4d5e6f7089a1b2c3d4e5f60718293a4b5c6d7e8f9
      - key: DATABASE_URL
        fromDatabase:
          name: sp-pickles-db
          property: connectionString

databases:
  - name: sp-pickles-db
    databaseName: sp_pickles
    user: sp_pickles_user
    plan: free
    region: oregon
