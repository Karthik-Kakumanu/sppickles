services:
  - type: web
    name: sp-pickles-backend
    env: node
    plan: free
    buildCommand: npm install && cd backend && npm install
    startCommand: cd backend && npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        fromDatabase:
          name: sp-pickles-db
          property: connectionString

databases:
  - name: sp-pickles-db
    databaseName: sp_pickles
    user: sp_pickles_user
    plan: free
    region: oregon
